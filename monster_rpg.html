body {

#container {

#game-canvas { display: block; }
.overlay {

#main-menu { background: radial-gradient(ellipse at 50% 30%, #1e2a50 0%, #0d1117 70%); pointer-events: auto !important; }

  letter-spacing: 6px; animation: titleGlow 2s ease-in-out infinite alternate; margin-bottom: 4px;
}
@keyframes titleGlow {
  from { text-shadow: 0 0 20px rgba(255,200,50,0.3), 0 4px 8px rgba(0,0,0,0.5); }
  to { text-shadow: 0 0 40px rgba(255,200,50,0.6), 0 0 60px rgba(255,180,20,0.2), 0 4px 8px rgba(0,0,0,0.5); }
}
#main-menu h2 { font-size: 18px; color: #8890aa; margin-bottom: 28px; letter-spacing: 5px; }
#main-menu .btn-row { display: flex; gap: 24px; margin-bottom: 12px; }
#main-menu .btn {
  width: 240px; padding: 14px 0; text-align: center; border-radius: 10px;
  font-size: 18px; cursor: pointer; transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
  border: 2px solid transparent; user-select: none; position: relative; overflow: hidden;
  font-weight: bold; letter-spacing: 3px;
}
#main-menu .btn::after {
  content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent); transition: left 0.5s;
  pointer-events: none;
}
#main-menu .btn:hover::after { left: 100%; }
#main-menu .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.4); }
#main-menu .btn:active { transform: translateY(0); }
#main-menu .btn-green { background: linear-gradient(135deg, #2d8c4e, #236b3a); color: #fff; border-color: rgba(80,200,100,0.3); }
#main-menu .btn-green:hover { border-color: #50dc64; box-shadow: 0 6px 24px rgba(80,220,100,0.2); }
#main-menu .btn-red { background: linear-gradient(135deg, #e04848, #b42828); color: #fff; border-color: rgba(220,60,60,0.3); }
#main-menu .btn-red:hover { border-color: #ff5050; box-shadow: 0 6px 24px rgba(220,60,60,0.2); }
#settings-overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(8,10,20,0.82); display: none;
  flex-direction: column; align-items: center; justify-content: center;

}
#settings-overlay.active { display: flex; pointer-events: auto !important; }
#settings-overlay .menu-card {
  background: linear-gradient(180deg, #1a2040 0%, #12172e 100%);
  border: 2px solid #3a3d55; border-radius: 16px;
  padding: 32px 48px; text-align: center;

}
@keyframes menuSlideIn {

  to { transform: translateY(0); opacity: 1; }
}
#settings-overlay h3 { font-size: 26px; color: #ffc832; margin-bottom: 20px; letter-spacing: 3px; }
#settings-overlay .s-btn {

}
#settings-overlay .s-btn::after {

  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent); transition: left 0.5s;

}
#settings-overlay .s-btn:hover::after { left: 100%; }
#settings-overlay .s-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.4); }
#settings-overlay .s-btn-continue { background: linear-gradient(135deg, #2d8c4e, #236b3a); color: #fff; border-color: rgba(80,200,100,0.3); }

// === 等级经验系统 ===
function expForLv(lv){
  if(lv>=40)return Infinity;
  const t={1:20,2:25,3:30,4:38,5:48,6:58,7:70,8:82,9:96,10:110,11:126,12:142,13:160,14:178,15:198,16:218,17:240,18:262,19:286,20:310,21:336,22:362,23:390,24:418,25:448,26:478,27:510,28:542,29:576,30:610,31:646,32:682,33:720,34:758,35:798,36:838,37:880,38:922,39:966,40:1010};
  return t[lv]||(lv*lv*1.5+10);
}
function getSkillsForLevel(mon){
  if(!mon||!mon.originId)return mon.skills||[];
  const lv=mon.level||1;
  if(mon.isLegendary){
    if(lv>=40)return mon._legSkills[40]||[];
    if(lv>=30)return mon._legSkills[30]||[];
    if(lv>=20)return mon._legSkills[20]||[];
    if(lv>=10)return mon._legSkills[10]||[];
    return mon._legSkills[1]||[];
  }
  if(START_SKILL_TREE[mon.originId]){
    const t=START_SKILL_TREE[mon.originId];
    if(lv>=40&&t[40])return [...t[40]];
    if(lv>=20&&t[20])return [...t[20]];
    if(lv>=10&&t[10])return [...t[10]];
    return [...(t[1]||[])];
  }
  if(WILD_SKILL_TREE[mon.originId]){
    const t=WILD_SKILL_TREE[mon.originId];
    if(lv>=40&&t[40])return [...t[40]];
    if(lv>=20&&t[20])return [...t[20]];
    if(lv>=10&&t[10])return [...t[10]];
    return [...(t[1]||[])];
  }
  return mon.skills||[];
}
function updateMonSkills(mon){
  const ns=getSkillsForLevel(mon);
  if(mon.skills.length!==ns.length){mon.skills=ns;return true;}
  return false;
}
function grantExp(mon,exp){
  if(!mon)return false;
  if(!mon.level||mon.level<1)mon.level=1;
  if(mon.level>=40)return false;
  if(typeof mon.exp!=='number'||isNaN(mon.exp))mon.exp=0;
  mon.exp+=exp;
  let lvled=false;
  while(mon.exp>=expForLv(mon.level)&&mon.level<40){
    mon.exp-=expForLv(mon.level);mon.level++;lvled=true;
    const mult=mon.isLegendary?1.4:1.0;
    mon.maxHp+=Math.floor((3+Math.floor(Math.random()*3))*mult);mon.hp=mon.maxHp;
    mon.maxMp+=Math.floor((2+Math.floor(Math.random()*2))*mult);mon.mp=mon.maxMp;
    mon.atk+=Math.floor((1+Math.random()*1.5)*mult);
    mon.def+=Math.floor((1+Math.random()*1.2)*mult);
    mon.spd+=Math.floor((0.5+Math.random()*0.8)*mult);
  }
  updateMonSkills(mon);
  return lvled;
}
function hasLevel40Mon(){return state.team.some(m=>m.level>=40);}

function isUltimateSkill(name){
  return name&&(name.startsWith('🔥')||name.startsWith('💧')||name.startsWith('🌿')||name.startsWith('⚡')||name.startsWith('🌑')||name.startsWith('❄️'));
}

// === 地图进入 ===
function handleMapClick(mx,my){
  if(state.screen!=='map-select')return;
  const profW=160,profH=36,profX=W/2-80,profY=H-100;
  if(hasLevel40Mon()&&isInRect(mx,my,profX,profY,profW,profH)){state.profDialog=true;state.profSelectedMon=null;return;}
  const lotW=160,lotH=36,lotX=W/2-80,lotY=H-55;
  if(isInRect(mx,my,lotX,lotY,lotW,lotH)){state.screen='lottery';return;}
  const cardW=160,cardH=210,gap=20;
  const startX=(W-(MAPS.length*cardW+(MAPS.length-1)*gap))/2;
  const startY=(H-cardH)/2-30;
  for(let i=0;i<MAPS.length;i++){
    const x=startX+i*(cardW+gap),y=startY;
    if(mx>=x&&mx<=x+cardW&&my>=y&&my<=y+cardH){enterMap(i);return;}
  }
}
function enterMap(index){
  const map=MAPS[index];state.currentMap=map;
  const candidates=Object.entries(MONSTERS).filter(([k,m])=>m.map===map.id);
  if(candidates.length===0)return;
  const [key,monData]=candidates[Math.floor(Math.random()*candidates.length)];
  const mon={...monData,level:1,originId:key,isLegendary:false};
  const mlr={grassland:[1,4],forest:[3,8],volcano:[6,14],snow:[10,20],shadow:[15,28]};
  const[mn,mxLv]=mlr[map.id]||[1,5];
  mon.level=mn+Math.floor(Math.random()*(mxLv-mn+1));
  mon.skills=[...getSkillsForLevel(mon)];
  const scale=1+(mon.level-1)*0.06;
  mon.hp=Math.floor(mon.hp*scale);mon.maxHp=mon.hp;
  mon.mp=Math.floor(mon.mp*scale);mon.maxMp=mon.mp;
  mon.atk=Math.floor(mon.atk*scale);mon.def=Math.floor(mon.def*scale);mon.spd=Math.floor(mon.spd*scale);
  state.currentMonster=mon;state.currentMonsterKey=key;
  state.currentMonsterHp=mon.hp;state.currentMonsterMp=mon.mp;
  state.battleLog=[];state.battleEnded=false;
  const active=state.team[state.activeMonster];
  if(active){
    active.hp=Math.max(active.hp,1);
    if(typeof active.exp!=='number'||isNaN(active.exp))active.exp=0;
    if(!active.level||active.level<1)active.level=1;
  }
  state.screen='battle';
  addBattleLog(`⚠️ Lv.${mon.level} 野生的 ${mon.name} 出现了！`);
}

// === 战斗系统 ===
function addBattleLog(msg){state.battleLog.push(msg);if(state.battleLog.length>8)state.battleLog.shift();}
function calcDamage(atk,def,power){return Math.max(1,Math.floor((atk*power/10-def*0.4)*(0.85+Math.random()*0.3)));}
function isBattleActive(){return state.screen==='battle'&&!state.battleEnded;}

function playerAttack(skillIndex){
  if(!isBattleActive())return;
  const active=state.team[state.activeMonster];
  if(!active||active.hp<=0)return;
  const skillName=active.skills[skillIndex];
  if(!skillName)return;
  // 终极技能
  if(isUltimateSkill(skillName)){
    const cost=Math.floor(active.mp*0.5);
    if(active.mp<cost){addBattleLog(`❌ MP不足！需要当前MP的50%(${cost})`);return;}
    active.mp-=cost;
    if(Math.random()>0.5){addBattleLog(`💥 ${active.name} 释放终极技能...MISS！`);monsterTurn();return;}
    const dmg=calcDamage(active.atk,state.currentMonster.def,100);
    state.currentMonsterHp-=dmg;
    addBattleLog(`💥 ${active.name} 释放终极技能【${skillName}】，${dmg}伤害！`);
    if(state.currentMonsterHp<=0){state.currentMonsterHp=0;onMonsterDefeated();return;}
    monsterTurn();return;
  }
  // 普通/神兽技能
  const skill=SKILLS[skillName]||LEGSKILLS[skillName];
  if(!skill)return;
  if(active.mp<skill.cost){addBattleLog(`❌ MP不足！需要${skill.cost}MP`);return;}
  active.mp-=skill.cost;
  const dmg=calcDamage(active.atk,state.currentMonster.def,skill.power);
  state.currentMonsterHp-=dmg;
  addBattleLog(`⚔️ ${active.name} 使用【${skill.name}】，${dmg}伤害！`);
  if(state.currentMonsterHp<=0){state.currentMonsterHp=0;onMonsterDefeated();return;}
  monsterTurn();
}
function monsterTurn(){
  const mon=state.currentMonster,active=state.team[state.activeMonster];
  if(!active||active.hp<=0)return;
  const sn=mon.skills[Math.floor(Math.random()*mon.skills.length)];
  const skill=SKILLS[sn]||LEGSKILLS[sn];
  if(skill&&mon.mp>=skill.cost){mon.mp-=skill.cost;const dmg=calcDamage(mon.atk,active.def,skill.power);active.hp-=dmg;addBattleLog(`💢 ${mon.name} 使用【${skill.name}】，${dmg}伤害！`);}
  else{const dmg=calcDamage(mon.atk,active.def,12);active.hp-=dmg;addBattleLog(`💢 ${mon.name} 普通攻击，${dmg}伤害！`);}
  if(active.hp<=0){active.hp=0;addBattleLog(`💀 ${active.name} 倒下了！`);
    const alive=state.team.findIndex(m=>m.hp>0);
    if(alive>=0){state.activeMonster=alive;addBattleLog(`🔄 换上${state.team[alive].name}！`);}
    else{addBattleLog('😵 全军覆没...');state.screen='gameover';}
  }
}
function onMonsterDefeated(){
  state.battleEnded=true;
  const mon=state.currentMonster;
  if(!mon)return;
  const goldR=Math.floor(mon.gold*(0.8+Math.random()*0.4));
  state.gold+=goldR;
  const lvBonus=1+(mon.level-1)*0.15;
  const expR=Math.floor(mon.exp*lvBonus*(0.9+Math.random()*0.3));
  addBattleLog(`🎉 ${mon.name} 被击败！`);
  addBattleLog(`💰 +${goldR}金币`);
  const active=state.team[state.activeMonster];
  if(active&&active.hp>0&&active.level<40){
    const oldLv=active.level;
    grantExp(active,expR);
    addBattleLog(`⭐ ${active.name} +${expR}经验`);
    if(active.level>oldLv){
      addBattleLog(`🎊 ${active.name} 升至Lv.${active.level}！`);
      if(active.skills.length>1)addBattleLog(`📜 技能:${active.skills.join('、')}`);
    }
  }
  setTimeout(()=>{if(state.battleEnded&&state.screen==='battle'){state.screen='map-select';state.battleEnded=false;}},2000);
}
function tryCatch(){
  if(!isBattleActive())return;
  let bt='pokeball';if((state.bag.greatball||0)>0)bt='greatball';
  if((state.bag[bt]||0)<=0){addBattleLog('❌ 精灵球不足！');return;}
  state.bag[bt]--;
  if(Math.random()<0.30){
    state.battleEnded=true;const mon=state.currentMonster;
    const nm={id:state.currentMonsterKey+'_'+Date.now(),originId:state.currentMonsterKey,name:mon.name,hp:mon.hp,maxHp:mon.hp,mp:mon.mp,maxMp:mon.mp,atk:mon.atk,def:mon.def,spd:mon.spd,skills:[...mon.skills],color:mon.color,shape:mon.shape||'blob',level:mon.level||1,exp:0,isLegendary:false,hasUltimate:false};
    if(state.team.length<6)state.team.push(nm);
    addBattleLog(`🎊 捕获Lv.${nm.level} ${mon.name}！`);
    if(state.team.length>=6)addBattleLog('⚠️ 队伍已满(最多6只)');
    setTimeout(()=>{if(state.battleEnded&&state.screen==='battle'){state.screen='map-select';state.battleEnded=false;}},1200);
  }else{addBattleLog(`😞 ${mon.name} 挣脱精灵球！`);monsterTurn();}
}
function fleeBattle(){
  if(!isBattleActive())return;
  const mon=state.currentMonster,active=state.team[state.activeMonster];
  if(Math.random()<(active&&active.spd>=mon.spd?0.8:0.4)){addBattleLog('🏃 成功逃跑！');state.screen='map-select';}
  else{addBattleLog('😰 逃跑失败！');monsterTurn();}
}

// === 博士系统 ===
function profReplaceSkill(mi){
  const mon=state.team[mi];
  if(!mon||mon.level<40)return;
  if(state.gold<PROF_COST){addBattleLog(`❌ 需要${PROF_COST}金币`);state.profDialog=false;return;}
  if(mon.hasUltimate){addBattleLog(`❌ ${mon.name}已习得终极技能`);state.profDialog=false;return;}
  state.gold-=PROF_COST;
  if(Math.random()<ULT_RATE){
    let un;const oi=mon.originId;
    if(oi==='charmander'||oi==='phoenix')un='🔥终极火焰';
    else if(oi==='squirtle'||oi==='ice_queen')un='❄️终极冰霜';
    else if(oi==='bulbasaur')un='🌿终极藤蔓';
    else if(oi==='dragon_god')un='⚡终极冲击';
    else if(mon.color&&mon.color.includes('50a0'))un='🌑终极暗影';
    else if(mon.color&&(mon.color.includes('64c8')||mon.color.includes('80e0')))un='❄️终极冰霜';
    else if(mon.color&&(mon.color.includes('ff50')||mon.color.includes('e850')))un='🔥终极火焰';
    else if(mon.color&&(mon.color.includes('5090')||mon.color.includes('78b4')))un='💧终极水流';
    else if(mon.color&&(mon.color.includes('50b8')||mon.color.includes('50a0')))un='🌿终极藤蔓';
    else un='⚡终极冲击';
    if(mon.skills.length>=4)mon.skills[3]=un;else mon.skills.push(un);
    mon.hasUltimate=true;
    addBattleLog(`🎉 ${mon.name}习得终极技能【${un}】！`);addBattleLog('⚠️ 终极:50%命中,消耗50%MP,威力巨大');
  }else{addBattleLog(`😞 ${mon.name}学习终极技能失败...`);}
  state.profDialog=false;
}

// === 抽奖系统 ===
function doLottery(times){
  if(times===1){if(state.gold<LOT_COST){addBattleLog(`❌ 需要${LOT_COST}金币`);return;}state.gold-=LOT_COST;}
  else{if(state.gold<LOT10_COST){addBattleLog(`❌ 需要${LOT10_COST}金币`);return;}state.gold-=LOT10_COST;}
  state.lotteryResult={rewards:[],legendaries:[]};
  const cnt=times===1?1:10;
  for(let i=0;i<cnt;i++){
    if(Math.random()<LEG_RATE){
      const leg=LEGENDARIES[Math.floor(Math.random()*LEGENDARIES.length)];
      const nm={id:leg.id+'_'+Date.now()+'_'+Math.random(),originId:leg.id,name:leg.name,hp:leg.hp,maxHp:leg.hp,mp:leg.mp,maxMp:leg.mp,atk:leg.atk,def:leg.def,spd:leg.spd,skills:[...(leg.s1||[])],color:leg.color,shape:leg.shape,level:1,exp:0,isLegendary:true,hasUltimate:false,_legSkills:{1:leg.s1||[],10:leg.s2||[],20:leg.s3||[],30:leg.s4||[],40:leg.s4||[]}};
      if(state.team.length<6)state.team.push(nm);
      state.lotteryResult.legendaries.push(leg);
    }else{
      const r=Math.random();
      if(r<0.4){const g=20+Math.floor(Math.random()*50);state.gold+=g;state.lotteryResult.rewards.push({type:'gold',amount:g});}
      else if(r<0.7){state.bag.pokeball=(state.bag.pokeball||0)+2;state.lotteryResult.rewards.push({type:'item',name:'精灵球 x2'});}
      else{state.bag.potion_hp=(state.bag.potion_hp||0)+1;state.lotteryResult.rewards.push({type:'item',name:'HP药剂 x1'});}
    }
  }
  state.lotteryFlash=60;
}

// === 商店 ===
function openShop(){if(state.screen==='map-select')state.screen='shop';}
function buyItem(itemId){
  const item=SHOP_ITEMS.find(i=>i.id===itemId);
  if(!item)return;
  if(state.gold<item.price){addBattleLog(`❌ 金币不足！需要${item.price}`);return;}
  state.gold-=item.price;
  if(item.type==='ball')state.bag[item.id]=(state.bag[item.id]||0)+1;
  else if(item.type==='hp'||item.type==='mp')state.bag[item.id]=(state.bag[item.id]||0)+item.effect;
  else if(item.type==='heal_all'){state.team.forEach(m=>{m.hp=m.maxHp;m.mp=m.maxMp;});addBattleLog('🌟 全员恢复！');}
  else if(item.type==='heal_all_single'){const m=state.team[state.activeMonster];if(m){m.hp=m.maxHp;m.mp=m.maxMp;}addBattleLog(`✨ ${m?m.name:'精灵'}完全恢复！`);}
  if(item.type!=='heal_all'&&item.type!=='heal_all_single')addBattleLog(`🛒 购买${item.name}`);
}
function useBagItem(itemKey,amount){
  const active=state.team[state.activeMonster];if(!active)return;
  if(itemKey==='potion_hp'||itemKey==='potion_hp2'){
    if((state.bag[itemKey]||0)<amount){addBattleLog('❌ 物品不足！');return;}
    state.bag[itemKey]-=amount;const heal=itemKey==='potion_hp'?20:50;
    active.hp=Math.min(active.maxHp,active.hp+heal);addBattleLog(`💊 ${active.name}恢复${heal}HP`);
  }else if(itemKey==='potion_mp'||itemKey==='potion_mp2'){
    if((state.bag[itemKey]||0)<amount){addBattleLog('❌ 物品不足！');return;}
    state.bag[itemKey]-=amount;const heal=itemKey==='potion_mp'?10:25;
    active.mp=Math.min(active.maxMp,active.mp+heal);addBattleLog(`💊 ${active.name}恢复${heal}MP`);
  }
}

// === 渲染主循环 ===
function gameLoop(){
  requestAnimationFrame(gameLoop);
  try{
    if(state.screen==='main-menu'){
      drawBg();
      return;
    }
    if(state.screen==='starter-select')renderStarterSelect();
    else if(state.screen==='map-select')renderMapSelect();
    else if(state.screen==='battle')renderBattle();
    else if(state.screen==='shop')renderShop();
    else if(state.screen==='lottery')renderLottery();
    else if(state.screen==='gameover')renderGameOver();
    if(showBagPanel)renderBagPanel();
    if(showTeamPanel)renderTeamPanel();
    if(state.profDialog)renderProfDialog();
    if(state.lotteryFlash>0)state.lotteryFlash--;
  }catch(e){console.error('Render error:',e);}
}

  ctx.fillText('操作',px+415,py+82);
  const items=[
    {k:'potion_hp',l:'❤️ HP药剂',d:'恢复当前精灵 20 HP',c:state.bag.potion_hp||0,usable:true},
    {k:'potion_hp2',l:'💖 高级HP药剂',d:'恢复当前精灵 50 HP',c:state.bag.potion_hp2||0,usable:true},
    {k:'potion_mp',l:'💙 MP药剂',d:'恢复当前精灵 10 MP',c:state.bag.potion_mp||0,usable:true},
    {k:'potion_mp2',l:'💎 高级MP药剂',d:'恢复当前精灵 25 MP',c:state.bag.potion_mp2||0,usable:true},
    {k:'pokeball',l:'🔴 精灵球',d:'30%概率捕获野生精灵',c:state.bag.pokeball||0,usable:false},
    {k:'greatball',l:'🟣 超级球',d:'30%概率捕获野生精灵',c:state.bag.greatball||0,usable:false},
  ];
  items.forEach((it,i)=>{
    const iy=py+88+i*38;
    // 行背景
    ctx.fillStyle=i%2===0?'rgba(255,255,255,0.03)':'transparent';ctx.fillRect(px+16,iy,428,34);
    // 名称
    ctx.fillStyle='#fff';ctx.font='bold 13px "Microsoft YaHei"';ctx.textAlign='left';ctx.fillText(it.l,px+28,iy+24);
    // 效果
    ctx.fillStyle='#8890aa';ctx.font='11px "Microsoft YaHei"';ctx.fillText(it.d,px+158,iy+24);
    // 数量
    ctx.fillStyle=it.c>0?'#ffd700':'#555';ctx.font='bold 14px "Microsoft YaHei"';ctx.textAlign='center';ctx.fillText(`x${it.c}`,px+350,iy+24);
    // 使用按钮（仅可使用的道具）
    if(it.usable&&it.c>0){
      const ux=px+390,uw=52,uh=24;const hover=isInRect(lastMouseX,lastMouseY,ux,iy+5,uw,uh);
      ctx.fillStyle=hover?'#50dc64':'#2d8c4e';roundRect(ux,iy+5,uw,uh,6);ctx.fill();
      ctx.fillStyle='#fff';ctx.font='bold 12px "Microsoft YaHei"';ctx.textAlign='center';ctx.fillText('使用',ux+uw/2,iy+22);
    }
  });
  // 底部信息
  const bix=px+16,biy=py+280;
  ctx.fillStyle='rgba(255,255,255,0.04)';ctx.fillRect(bix,biy,428,1);
  const active=state.team[state.activeMonster];
  if(active){
    ctx.fillStyle='#8ab4ff';ctx.font='12px "Microsoft YaHei"';ctx.textAlign='left';
    ctx.fillText(`当前出战: Lv.${active.level} ${active.name}  HP:${active.hp}/${active.maxHp}  MP:${active.mp}/${active.maxMp}`,px+28,biy+18);
  }
  const cx=W/2-40,cy=py+295,cw=80,ch=26;drawBtn(cx,cy,cw,ch,'关闭','#505070','#404058',isInRect(lastMouseX,lastMouseY,cx,cy,cw,ch));
}

// === 队伍面板 ===
let showTeamPanel=false;
function renderTeamPanel(){
  if(!showTeamPanel)return;
  ctx.fillStyle='rgba(8,10,20,0.85)';ctx.fillRect(0,0,W,H);
  const px=W/2-300,py=H/2-210;ctx.fillStyle='rgba(20,28,50,0.97)';roundRect(px,py,600,420,14);ctx.fill();
  ctx.strokeStyle='#606890';ctx.lineWidth=2;ctx.beginPath();roundRectPath(px,py,600,420,14);ctx.stroke();
  ctx.fillStyle='#ffc832';ctx.font='bold 22px "Microsoft YaHei"';ctx.textAlign='center';ctx.fillText('👥 精灵队伍',W/2,py+34);
  ctx.fillStyle='#8890aa';ctx.font='11px "Microsoft YaHei"';ctx.fillText('点击"出战"切换当前精灵 | 最多携带6只',W/2,py+54);
  // 表头
  ctx.fillStyle='rgba(255,255,255,0.06)';ctx.fillRect(px+16,py+64,568,22);
  ctx.fillStyle='#aab0cc';ctx.font='bold 10px "Microsoft YaHei"';ctx.textAlign='left';
  ctx.fillText('精灵',px+75,py+80);
  ctx.textAlign='center';
  ctx.fillText('HP / MP',px+285,py+80);
  ctx.fillText('属性',px+385,py+80);
  ctx.fillText('经验',px+460,py+80);
  ctx.fillText('操作',px+535,py+80);
  const rowH=53; // 每行高度增加
  state.team.forEach((m,i)=>{
    const iy=py+90+i*rowH,isActive=i===state.activeMonster;
    // 高亮当前出战精灵
    ctx.fillStyle=isActive?'rgba(255,200,50,0.12)':(i%2===0?'rgba(255,255,255,0.02)':'transparent');
    ctx.fillRect(px+16,iy,568,rowH-2);
    if(isActive){ctx.strokeStyle='#ffc832';ctx.lineWidth=1.5;ctx.beginPath();roundRectPath(px+16,iy,568,rowH-2,6);ctx.stroke();}
    // 精灵贴图
    drawMonsterSprite(px+48,iy+rowH/2,28,m,true);
    // 名称和等级
    const legTag=m.isLegendary?' ⭐':'';
    const ultTag=m.hasUltimate?' ◆':'';
    ctx.fillStyle='#fff';ctx.font='bold 13px "Microsoft YaHei"';ctx.textAlign='left';
    ctx.fillText(`${isActive?'▶ ':''}Lv.${m.level} ${m.name}${legTag}${ultTag}`,px+75,iy+19);
    ctx.fillStyle='#8890aa';ctx.font='9px "Microsoft YaHei"';
    const skillsStr=m.skills.join(' | ');
    ctx.fillText(`技能: ${skillsStr}`,px+75,iy+38);
    // HP条 + 数值（上下排列，更清晰）
    const hx=px+195,hw=100,hh=6;
    const hpP=Math.max(0,m.hp/m.maxHp);
    ctx.fillStyle='#333';roundRect(hx,iy+8,hw,hh,3);ctx.fill();
    ctx.fillStyle=hpP>0.5?'#50dc64':hpP>0.25?'#ffc832':'#ff5050';
    roundRect(hx,iy+8,hw*Math.max(0.02,hpP),hh,3);ctx.fill();
    ctx.fillStyle='#fff';ctx.font='bold 10px "Microsoft YaHei"';ctx.textAlign='center';
    ctx.fillText(`HP ${m.hp}/${m.maxHp}`,hx+hw/2,iy+8+hh+10);
    // MP条 + 数值
    const mpP=Math.max(0,m.mp/m.maxMp);
    ctx.fillStyle='#333';roundRect(hx,iy+30,hw,hh,3);ctx.fill();
    ctx.fillStyle='#64b4ff';roundRect(hx,iy+30,hw*Math.max(0.02,mpP),hh,3);ctx.fill();
    ctx.fillStyle='#aad4ff';ctx.font='bold 10px "Microsoft YaHei"';
    ctx.fillText(`MP ${m.mp}/${m.maxMp}`,hx+hw/2,iy+30+hh+10);
    // 属性
    ctx.fillStyle='#ccc';ctx.font='10px "Microsoft YaHei"';ctx.textAlign='center';
    ctx.fillText(`ATK:${m.atk} DEF:${m.def}`,px+385,iy+18);
    ctx.fillText(`SPD:${m.spd}`,px+385,iy+36);
    // 经验
    ctx.fillStyle='#ffd700';ctx.font='10px "Microsoft YaHei"';
    if(m.level>=40){ctx.fillText('MAX',px+460,iy+24);ctx.fillStyle='#ffc832';ctx.font='bold 10px "Microsoft YaHei"';ctx.fillText('已满级',px+460,iy+40);}
    else{ctx.fillText(`${m.exp||0}/${expForLv(m.level)}`,px+460,iy+24);}
    // 出战按钮
    if(!isActive&&m.hp>0){
      const bx=px+505,bw=56,bh=28;const hover=isInRect(lastMouseX,lastMouseY,bx,iy+12,bw,bh);
      ctx.fillStyle=hover?'#50dc64':'#2d8c4e';roundRect(bx,iy+12,bw,bh,6);ctx.fill();
      ctx.fillStyle='#fff';ctx.font='bold 12px "Microsoft YaHei"';ctx.textAlign='center';ctx.fillText('出战',bx+bw/2,iy+12+bh/2+4);
    }
    // 已出战标识
    if(isActive){ctx.fillStyle='#ffc832';ctx.font='bold 12px "Microsoft YaHei"';ctx.textAlign='center';ctx.fillText('当前出战',px+533,iy+26);}
  });
  const cx=W/2-40,cy=py+380,cw=80,ch=28;drawBtn(cx,cy,cw,ch,'关闭','#505070','#404058',isInRect(lastMouseX,lastMouseY,cx,cy,cw,ch));
}

// === 辅助函数 ===
function drawBtn(x,y,w,h,text,c1,c2,hover){
  const g=ctx.createLinearGradient(x,y,x,y+h);g.addColorStop(0,hover?c1:c2);g.addColorStop(1,c2);
  ctx.fillStyle=g;roundRect(x,y,w,h,8);ctx.fill();
  ctx.strokeStyle=hover?'rgba(255,255,255,0.3)':'rgba(255,255,255,0.1)';ctx.lineWidth=1.5;
  ctx.beginPath();roundRectPath(x,y,w,h,8);ctx.stroke();
  ctx.fillStyle='#fff';ctx.font='bold 14px "Microsoft YaHei"';ctx.textAlign='center';ctx.fillText(text,x+w/2,y+h/2+5);
}
function roundRect(x,y,w,h,r){ctx.beginPath();roundRectPath(x,y,w,h,r);}
function roundRectPath(x,y,w,h,r){
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}
let lastMouseX=-1,lastMouseY=-1;
function isInRect(mx,my,x,y,w,h){return mx>=x&&mx<=x+w&&my>=y&&my<=y+h;}

// === 鼠标事件 ===
function onMouseMove(e){
  const rect=canvas.getBoundingClientRect();lastMouseX=e.clientX-rect.left;lastMouseY=e.clientY-rect.top;
  if(state.screen==='main-menu')return;
  if(state.screen==='starter-select'){
    const cw=220,ch=320,gap=40,tw=STARTERS.length*cw+(STARTERS.length-1)*gap,sx=(W-tw)/2,sy=110;
    let found=false;
    for(let i=0;i<STARTERS.length;i++){const x=sx+i*(cw+gap);if(isInRect(lastMouseX,lastMouseY,x,sy,cw,ch)){state.starterHover=i;found=true;break;}}
    if(!found)state.starterHover=null;
  }
  if(state.screen==='map-select'&&!showBagPanel&&!showTeamPanel&&!state.profDialog){
    const cw=160,ch=210,gap=20,sx=(W-(MAPS.length*cw+(MAPS.length-1)*gap))/2,sy=78;
    let found=false;
    for(let i=0;i<MAPS.length;i++){const x=sx+i*(cw+gap);if(isInRect(lastMouseX,lastMouseY,x,sy,cw,ch)){state.mapHover=i;found=true;break;}}
    if(!found){
      const bw=160,bh=38,btnGap=14,threeW=Math.floor((W-(bw*3+btnGap*2))/2);
      const bottomY=H-120,rowGap=48;
      // 第一行：商店/抽奖/队伍
      if(isInRect(lastMouseX,lastMouseY,threeW,bottomY,bw,bh)){state.mapHover=-1;return;}
      if(isInRect(lastMouseX,lastMouseY,threeW+bw+btnGap,bottomY,bw,bh)){state.mapHover=-4;return;}
      if(isInRect(lastMouseX,lastMouseY,threeW+(bw+btnGap)*2,bottomY,bw,bh)){state.mapHover=-2;return;}
      // 第二行：博士
      if(hasLevel40Mon()&&isInRect(lastMouseX,lastMouseY,W/2-80,bottomY+rowGap,bw,bh)){state.mapHover=-3;return;}
      state.mapHover=null;
    }
  }
}
function onClick(e){
  const rect=canvas.getBoundingClientRect(),mx=e.clientX-rect.left,my=e.clientY-rect.top;
  // 主菜单时忽略canvas点击（由HTML按钮处理）
  if(state.screen==='main-menu')return;
  if(document.getElementById('settings-overlay').classList.contains('active'))return;
  // 博士对话框
  if(state.profDialog){
    const px=W/2-280,py=H/2-200;
    if(isInRect(mx,my,W/2-60,py+355,120,32)){state.profDialog=false;return;}
    state.team.forEach((m,i)=>{
      if(m.level<40||m.hasUltimate)return;
      const iy=py+90+i*42;
      if(isInRect(mx,my,px+460,iy+5,80,28))profReplaceSkill(i);
    });
    return;
  }
  // 背包
  if(showBagPanel){
    const px=W/2-230,py=H/2-165;
    if(isInRect(mx,my,W/2-40,py+295,80,26)){showBagPanel=false;return;}
    const bagItems=['potion_hp','potion_hp2','potion_mp','potion_mp2'];
    bagItems.forEach((k,i)=>{
      const iy=py+88+i*38;
      if(isInRect(mx,my,px+390,iy+5,52,24)&&(state.bag[k]||0)>0){useBagItem(k,1);showBagPanel=false;}
    });
    return;
  }
  // 队伍
  if(showTeamPanel){
    const px=W/2-300,py=H/2-210,rowH=53;
    if(isInRect(mx,my,W/2-40,py+380,80,28)){showTeamPanel=false;return;}
    state.team.forEach((m,i)=>{if(m.hp>0&&i!==state.activeMonster&&isInRect(mx,my,px+505,py+90+i*rowH+12,56,28)){state.activeMonster=i;showTeamPanel=false;}});
    return;
  }
  // 精灵选择
  if(state.screen==='starter-select'){
    const cw=220,ch=320,gap=40,tw=STARTERS.length*cw+(STARTERS.length-1)*gap,sx=(W-tw)/2,sy=110;
    for(let i=0;i<STARTERS.length;i++){const x=sx+i*(cw+gap);if(isInRect(mx,my,x,sy,cw,ch)){selectStarter(i);return;}}
    return;
  }
  // 地图
  if(state.screen==='map-select'){
    handleMapClick(mx,my);
    const bw=160,bh=38,btnGap=14,threeW=Math.floor((W-(bw*3+btnGap*2))/2);
    const bottomY=H-120,rowGap=48;
    if(isInRect(mx,my,threeW,bottomY,bw,bh)){openShop();return;}
    if(isInRect(mx,my,threeW+bw+btnGap,bottomY,bw,bh)){state.screen='lottery';return;}
    if(isInRect(mx,my,threeW+(bw+btnGap)*2,bottomY,bw,bh)){showTeamPanel=true;return;}
    if(hasLevel40Mon()&&isInRect(mx,my,W/2-80,bottomY+rowGap,bw,bh)){state.profDialog=true;return;}
    return;
  }
  // 商店
  if(state.screen==='shop'){
    const cols=4,iw=210,ih=90,gx=20,gy=16,sx=(W-(cols*iw+(cols-1)*gx))/2,sy=92;
    SHOP_ITEMS.forEach((item,i)=>{const col=i%cols,row=Math.floor(i/cols),x=sx+col*(iw+gx),y=sy+row*(ih+gy);if(isInRect(mx,my,x,y,iw,ih))buyItem(item.id);});
    if(isInRect(mx,my,W/2-80,H-50,160,36))state.screen='map-select';
    return;
  }
  // 抽奖
  if(state.screen==='lottery'){
    const bw=170,bh=44;
    const cardY=122,cardH=170,btnY=cardY+cardH+18;
    if(isInRect(mx,my,W/2-bw-12,btnY,bw,bh))doLottery(1);
    if(isInRect(mx,my,W/2+12,btnY,bw,bh))doLottery(10);
    if(isInRect(mx,my,W/2-80,H-50,160,36))state.screen='map-select';
    return;
  }
  // 战斗
  if(state.screen==='battle'){
    if(state.battleEnded)return;
    const pY=H*0.5,active=state.team[state.activeMonster];
    if(active&&active.hp>0){
      const sbw=140,sbh=36,sgap=8,ssx=30,ssy=pY+20;
      active.skills.forEach((_,i)=>{const col=i%2,row=Math.floor(i/2),sx=ssx+col*(sbw+sgap),sy=ssy+row*(sbh+sgap);if(isInRect(mx,my,sx,sy,sbw,sbh))playerAttack(i);});
    }
    const rx=W-200,rw=170,rh=32,rsy=pY+20;
    if(isInRect(mx,my,rx,rsy,rw,rh)){showBagPanel=true;return;}
    if(isInRect(mx,my,rx,rsy+40,rw,rh)){showTeamPanel=true;return;}
    if(isInRect(mx,my,rx,rsy+80,rw,rh)){fleeBattle();return;}
    if(isInRect(mx,my,rx,rsy+120,rw,rh)){tryCatch();return;}
    return;
  }
  // 游戏结束
  if(state.screen==='gameover'){
    const cx=W/2,cy=H/2-20,by=cy+85;
    if(isInRect(mx,my,cx-60,by,120,34)){state.team.forEach(m=>{m.hp=m.maxHp;m.mp=m.maxMp;});state.screen='map-select';}
    return;
  }
}

// === 键盘事件 ===
document.addEventListener('keydown',(e)=>{
  if(e.key==='Escape'){e.preventDefault();
    if(showBagPanel){showBagPanel=false;return;}
    if(showTeamPanel){showTeamPanel=false;return;}
    if(state.profDialog){state.profDialog=false;return;}
    if(state.screen==='main-menu')return;
    const s=document.getElementById('settings-overlay');
    if(s.classList.contains('active'))resumeGame();
    else showSettings();
  }
});

if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',init);}
else{init();}
</script>
